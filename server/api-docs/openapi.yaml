info:
  title: Vector API
  description: Full API specification for the Vector fleet management platform
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    SignInDto:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        device_id:
          type: string
      required:
        - email
        - password
    SignUpDriverDto:
      type: object
      properties:
        company_code:
          type: string
        full_name:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: /^\+\d{1,3}\d{10}$/
        password:
          type: string
          minLength: 8
          maxLength: 32
        vehicle_type:
          type: string
        vehicle_plate:
          type: string
      required:
        - company_code
        - full_name
        - email
        - phone
        - password
    SignUpFleetDto:
      type: object
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 32
        company_name:
          type: string
          minLength: 2
          maxLength: 100
        company_size:
          type: string
        plan_id:
          type: string
          minLength: 1
      required:
        - full_name
        - email
        - password
        - company_name
        - plan_id
    VerifyEmailDto:
      type: object
      properties:
        email:
          type: string
          format: email
        token:
          type: string
      required:
        - email
        - token
    ResendVerificationDto:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    ResetPasswordDto:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 32
      required:
        - token
        - new_password
    RefreshTokenDto:
      type: object
      properties:
        refresh_token:
          type: string
        device_id:
          type: string
      required:
        - refresh_token
    UpdateDriverProfileDto:
      type: object
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 50
        phone:
          type: string
          pattern: /^\+\d{1,3}\d{10}$/
        vehicle_type:
          type: string
          minLength: 2
          maxLength: 30
        vehicle_make:
          type: string
          minLength: 2
          maxLength: 30
        vehicle_model:
          type: string
          minLength: 1
          maxLength: 30
        vehicle_plate:
          type: string
          minLength: 2
          maxLength: 15
        vehicle_color:
          type: string
          minLength: 3
          maxLength: 20
        license_number:
          type: string
          minLength: 5
          maxLength: 30
    JoinCompanyDto:
      type: object
      properties:
        company_code:
          type: string
      required:
        - company_code
    CreateOrderDto:
      type: object
      properties:
        customer_name:
          type: string
        customer_email:
          type: string
          format: email
        customer_phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        packages:
          type: number
          minimum: 1
        priority:
          type: object
        time_window_start:
          type: string
        time_window_end:
          type: string
        delivery_date:
          type: string
        notes:
          type: string
      required:
        - customer_name
        - address
    UpdateOrderDto:
      type: object
      properties:
        customer_name:
          type: string
        customer_email:
          type: string
          format: email
        customer_phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        packages:
          type: number
          minimum: 1
        priority:
          type: object
        time_window_start:
          type: string
        time_window_end:
          type: string
        delivery_date:
          type: string
        notes:
          type: string
        route_id:
          type: string
        driver_id:
          type: string
        status:
          type: object
        lat:
          type: number
        lng:
          type: number
        driver_name:
          type: string
        route_name:
          type: string
        assigned_to:
          type: string
        service_time_min:
          type: number
    ReassignStopDto:
      type: object
      properties:
        driver_id:
          type: string
    CreateDriverDto:
      type: object
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        vehicle_type:
          type: string
        vehicle_plate:
          type: string
      required:
        - full_name
        - email
        - phone
    UpdateDriverDto:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        status:
          type: object
        vehicle_type:
          type: string
        vehicle_plate:
          type: string
    Object:
      type: object
      properties: {}
    ReportQueryDto:
      type: object
      properties:
        start_date:
          type: string
        end_date:
          type: string
        driver_id:
          type: string
        format:
          type: object
    ChangePlanDto:
      type: object
      properties:
        plan_id:
          type: string
        billing_cycle:
          type: object
      required:
        - plan_id
    UpdateCompanySettingsDto:
      type: object
      properties:
        name:
          type: string
        billing_email:
          type: string
        contact_email:
          type: string
        phone:
          type: string
        city:
          type: string
        state:
          type: string
        timezone:
          type: string
    UpdateNotificationsDto:
      type: object
      properties:
        email:
          type: boolean
        sms:
          type: boolean
        push:
          type: boolean
        driverAlerts:
          type: boolean
        deliveryUpdates:
          type: boolean
        paymentAlerts:
          type: boolean
        weeklyReport:
          type: boolean
    UpdateRouteSettingsDto:
      type: object
      properties:
        auto_optimize:
          type: boolean
        default_start_address:
          type: string
        default_end_address:
          type: string
    CreateApiKeyDto:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    GeocodeDto:
      type: object
      properties:
        address:
          type: string
        filter:
          type: string
        bias:
          type: string
      required:
        - address
    WaypointDto:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng
    DirectionsDto:
      type: object
      properties:
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/WaypointDto"
      required:
        - waypoints
    ReverseGeocodeDto:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng
    UpdateStatusDto:
      type: object
      properties:
        status:
          type: object
      required:
        - status
    UpdateLocationDto:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng
    OptimizeRouteDto:
      type: object
      properties:
        stopIds:
          type: array
          items:
            type: string
        currentLat:
          type: number
        currentLng:
          type: number
        persist:
          type: boolean
          description: When true, writes optimized `sequence` (and route
            distance/duration) to the database.
      required:
        - stopIds
        - currentLat
        - currentLng
    CreateOptimizedRouteDto:
      type: object
      properties:
        stopIds:
          type: array
          items:
            type: string
        name:
          type: string
      required:
        - stopIds
    AdHocStopDto:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        address:
          type: string
        packages:
          type: number
          minimum: 1
        notes:
          type: string
        externalId:
          type: string
        priority:
          type: string
        delivery_date:
          type: string
      required:
        - address
    CreateAdHocRouteDto:
      type: object
      properties:
        name:
          type: string
        stops:
          type: array
          items:
            $ref: "#/components/schemas/AdHocStopDto"
      required:
        - name
        - stops
    CompleteDeliveryDto:
      type: object
      properties:
        notes:
          type: string
        photo_urls:
          type: array
          items:
            type: string
    FailDeliveryDto:
      type: object
      properties:
        reason:
          type: string
        notes:
          type: string
      required:
        - reason
    ExportHistoryDto:
      type: object
      properties:
        range:
          type: string
        startDate:
          type: string
        endDate:
          type: string
      required:
        - range
    UploadAvatarDto:
      type: object
      properties:
        file_url:
          type: string
      required:
        - file_url
    UpdateDriverSettingsDto:
      type: object
      properties:
        notifications_enabled:
          type: boolean
        sound_enabled:
          type: boolean
        vibration_enabled:
          type: boolean
        dark_mode:
          type: boolean
        compact_view:
          type: boolean
        push:
          type: boolean
        email:
          type: boolean
        sms:
          type: boolean
        language:
          type: string
        units:
          type: string
        autoOptimize:
          type: boolean
        voiceGuidance:
          type: boolean
    OnboardingDto:
      type: object
      properties:
        vehicle_type:
          type: string
        vehicle_plate:
          type: string
      required:
        - vehicle_type
        - vehicle_plate
    RouteStopDto:
      type: object
      properties:
        stop_id:
          type: string
        sequence:
          type: number
      required:
        - stop_id
        - sequence
    CreateRouteDto:
      type: object
      properties:
        name:
          type: string
        driver_id:
          type: string
        date:
          type: string
        stops:
          type: array
          items:
            $ref: "#/components/schemas/RouteStopDto"
      required:
        - name
    UpdateRouteDto:
      type: object
      properties:
        name:
          type: string
        driver_id:
          type: string
        status:
          type: object
        date:
          type: string
        stops:
          type: array
          items:
            $ref: "#/components/schemas/RouteStopDto"
    AssignRouteDto:
      type: object
      properties:
        driver_id:
          type: string
      required:
        - driver_id
