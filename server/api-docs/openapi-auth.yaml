openapi: 3.0.0
info:
  title: Vector Auth API
  description: Authentication endpoints for Vector fleet management platform
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Auth
    description: Authentication & Authorization
paths:
  /auth/sign-in:
    post:
      summary: Sign in user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInDto'
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/sign-up/driver:
    post:
      summary: Register a new driver
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpDriverDto'
      responses:
        '201':
          description: Driver registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account created. Please verify your email.
                  user_id:
                    type: string
                    format: uuid
                    example: 123e4567-e89b-12d3-a456-426614174000
                  company:
                    $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/sign-up/fleet:
    post:
      summary: Register a new fleet company and admin user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpFleetDto'
      responses:
        '201':
          description: Fleet owner registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Company and account created. Please verify your email.
                  user_id:
                    type: string
                    format: uuid
                    example: 123e4567-e89b-12d3-a456-426614174000
                  company:
                    $ref: '#/components/schemas/CompanyResponse'
                  checkout_url:
                    type: string
                    format: uri
                    example: https://paystack.com/pay/stub
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/verify-email:
    post:
      summary: Verify user email using OTP token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailDto'
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email verified successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/forgot-password:
    post:
      summary: Request password reset link
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordDto'
      responses:
        '200':
          description: Reset link requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If that email exists, a reset link has been sent.
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/reset-password:
    post:
      summary: Reset password using token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordDto'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      summary: Refresh JWT access token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenDto'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/sign-out:
    post:
      summary: Sign out user by revoking refresh token
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Successfully signed out
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SignInDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: driver@example.com
        password:
          type: string
          example: strongpassword123
    
    SignUpDriverDto:
      type: object
      required:
        - company_code
        - full_name
        - email
        - phone
        - password
      properties:
        company_code:
          type: string
          example: FLEET-XYZ123
        full_name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        phone:
          type: string
          example: "+1234567890"
        password:
          type: string
          minLength: 8
          maxLength: 32
          example: securePasswerd456
        vehicle_type:
          type: string
          example: "Van"
        vehicle_plate:
          type: string
          example: "ABC-1234"

    SignUpFleetDto:
      type: object
      required:
        - full_name
        - email
        - password
        - company_name
        - plan_id
      properties:
        full_name:
          type: string
          example: Jane Smith
        email:
          type: string
          format: email
          example: jane.smith@fleetcorp.com
        password:
          type: string
          minLength: 8
          maxLength: 32
          example: adminPassword789
        company_name:
          type: string
          example: Fleet Corp
        company_size:
          type: string
          example: "10-50"
        plan_id:
          type: string
          example: "pro_plan"

    VerifyEmailDto:
      type: object
      required:
        - email
        - token
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        token:
          type: string
          example: "123456"

    ForgotPasswordDto:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com

    ResetPasswordDto:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
          example: "reset-token-abc"
        new_password:
          type: string
          minLength: 8
          maxLength: 32
          example: newSecurePass123!

    RefreshTokenDto:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        email:
          type: string
          format: email
          example: user@example.com
        role:
          type: string
          example: driver
        company_id:
          type: string
          format: uuid
          example: 987fcdeb-51a2-43d7-9012-345678901234

    CompanyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 987fcdeb-51a2-43d7-9012-345678901234
        name:
          type: string
          example: Fleet Corp
        company_code:
          type: string
          example: FLEET-XYZ123

    AuthTokensResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/UserResponse'

    ErrorModel:
      type: object
      properties:
        error:
          type: string
          example: bad_request
        message:
          type: string
          example: Error message details
        details:
          type: object

  responses:
    BadRequest:
      description: Bad Request (Validation failed)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
            
    Unauthorized:
      description: Unauthorized (Invalid credentials or token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
            
    NotFound:
      description: Not Found (e.g. invalid company_code)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
            
    Conflict:
      description: Conflict (e.g. email already exists)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
            
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
