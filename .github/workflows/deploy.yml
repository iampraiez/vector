name: CI/CD – Vector Infrastructure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-server:
    name: "Server: Lint & Type-check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: server
        run: pnpm prisma generate

      - name: Lint
        working-directory: server
        run: pnpm lint

      - name: Type-check
        working-directory: server
        run: pnpm tsc --noEmit

  quality-web:
    name: "Web: Lint & Type-check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Type-check
        working-directory: web
        run: pnpm tsc --noEmit

  build-server:
    name: "Server: Build"
    runs-on: ubuntu-latest
    needs: quality-server

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: server
        run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        working-directory: server
        run: pnpm build

  build-web:
    name: "Web: Build"
    runs-on: ubuntu-latest
    needs: quality-web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: web
        run: pnpm build
