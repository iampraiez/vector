name: Flutter Client CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Dependencies
        run: flutter pub get
          
      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true
          
      - name: Analyze
        run: flutter analyze
        continue-on-error: true
          
      - name: Run Tests
        run: |
          # Skip the default counter smoke test generated by Flutter (widget_test.dart)
          # which tests a widget that doesn't exist in this app.
          # Only run tests if there are non-default test files present.
          if find test -name "*.dart" -not -name "widget_test.dart" | grep -q .; then
            flutter test
          else
            echo "No app-specific tests found. Skipping."
          fi
          
      - name: Build Android Release
        run: flutter build apk --release
