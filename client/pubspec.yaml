name: "client"
description: "Vector Client"
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.5
  country_picker: ^2.0.27
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.4
  intl: ^0.19.0

  # ── Map: Tile rendering + GPS + Routing ──────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  flutter_map_cancellable_tile_provider: ^3.0.0

  # ── PoD: Photo capture ──────────────────────────────────────────────────
  # API-ready: swap onTap stub with ImagePicker().pickImage(source: ImageSource.camera)
  image_picker: ^1.1.2

  # ── PoD: QR code scanning ───────────────────────────────────────────────
  # API-ready: replace simulated tap with MobileScannerController
  mobile_scanner: ^5.2.3

  # ── Local storage: save PoD photo to temp dir ────────────────────────────
  path_provider: ^2.1.4

  # ── API: HTTP client for backend endpoints ───────────────────────────────
  # Swap MockRouteService calls with Dio requests
  dio: ^5.7.0

  # ── Auth: secure JWT token storage ──────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  flutter_foreground_task: ^9.2.1
  file_picker: ^10.3.10
  csv: ^8.0.0

  # ── Hive: Local persistence ──────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # ── Hive generator ───────────────────────────────────────────────────────
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:

  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/vector_icon.png"

