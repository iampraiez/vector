services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vector
      POSTGRES_PASSWORD: vector
      POSTGRES_DB: vector
    ports:
      - "5432:5432"
    volumes:
      - vector_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  vector_pg_data:
